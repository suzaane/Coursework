{% extends "base.html" %}
{% block content %}
<div class="dashboard-card">
    <h2><i class="fas fa-tags"></i> Team Types</h2>
    <p class="text-muted">Categorise engineering teams by type</p>
    
    <div class="row">
        {% for tt in team_types %}
        <div class="col-md-4 mb-3">
            <div class="team-card text-center">
                <i class="fas fa-tag fa-3x text-primary mb-2"></i>
                <h4>{{ tt.name }}</h4>
                <p class="text-muted">{{ tt.description|default:"No description" }}</p>
            </div>
        </div>
        {% empty %}
        <div class="col-12">
            <div class="alert alert-info">No team types found. <a href="/admin/organisation/teamtype/add/">Add some</a></div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
